<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dari dinara🍀</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:'Poppins',sans-serif;
    background: linear-gradient(135deg,#081c15,#1b4332,#2d6a4f,#40916c,#52b788);
}

/* HIJRIAH */
.hijriah{
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    font-family:'Great Vibes',cursive;
    font-size:28px;
    color:#d8f3dc;
}

/* BULAN */
.moon{
    position:absolute;
    top:60px;
    left:50%;
    transform:translateX(-50%);
    font-size:40px;
    animation:floatMoon 3s infinite alternate;
}

@keyframes floatMoon{
    to{transform:translateX(-50%) translateY(10px);}
}

/* BINTANG GANTUNG */
.star{
    position:absolute;
    top:0;
    font-size:18px;
    color:#d8f3dc;
    animation:swing 3s infinite alternate ease-in-out;
}

@keyframes swing{
    from{transform:translateY(0) rotate(-5deg);}
    to{transform:translateY(25px) rotate(5deg);}
}

/* SLIDE */
.slide{
    display:none;
    height:100vh;
    width:100%;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    position:absolute;
}

.active{
    display:flex;
}

/* CARD */
.card{
    background: linear-gradient(135deg,#2d6a4f,#40916c);
    padding:25px;
    border-radius:25px;
    width:320px;
    box-shadow:0 15px 40px rgba(0,0,0,0.5);
}

/* TEXT */
h1{
    font-family:'Great Vibes',cursive;
    font-size:30px;
    color:#d8f3dc;
}

p{
    font-size:14px;
    color:#b7e4c7;
}

/* FOTO ZOOM */
img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:15px;
    margin-top:10px;
    transform:scale(0.5);
    opacity:0;
}

.active img{
    animation:zoomIn 0.8s ease forwards;
}

@keyframes zoomIn{
    to{transform:scale(1);opacity:1;}
}

/* BUTTON */
button{
    margin-top:15px;
    padding:8px 15px;
    border:none;
    border-radius:20px;
    background:#74c69d;
    color:#081c15;
    cursor:pointer;
    font-weight:bold;
}

/* HUJAN EMOJI */
.emoji{
    position:absolute;
    top:-20px;
    font-size:10px;
    animation:fall linear infinite;
}

/* DAUN */
.leaf{
    position:absolute;
    font-size:14px;
    animation:fall linear infinite;
    opacity:0.7;
}

/* SPARKLES */
.sparkle{
    position:absolute;
    font-size:12px;
    animation:blink 1.5s infinite alternate;
}

@keyframes blink{
    from{opacity:0.2;}
    to{opacity:1;}
}

@keyframes fall{
    to{transform:translateY(110vh);}
}
</style>
</head>

<body>

<div class="hijriah">1447 Hijriah 💚</div>
<div class="moon">🌙</div>

<!-- BINTANG -->
<div class="star" style="left:110%">⭐</div>
<div class="star" style="left:90%">✨</div>
<div class="star" style="left:60%">⭐</div>
<div class="star" style="left:80%">✨</div>

<!-- SLIDE 1 -->
<div class="slide active">
    <div class="card">
        <h1>Eid Mubarak,FREE PALESTINE 💚</h1>
        <img src="4b54344ba3a6fe69b22de55622295a60.jpg">
        <p>Minal Aidin Wal Faizin<br>Mohon maaf lahir batin 🙏</p>
        <p>Semoga Allah swt selalu melindungi saudara kita di palestine</p>
        <button onclick="nextSlide()">Next ➡️</button>
    </div>
</div>

<!-- SLIDE 2 -->
<div class="slide">
    <div class="card">
        <h1>NCT Dream 🌱</h1>
        <img src="7d897513d7678f93da7c21f88e5564d2.jpg">
        <p>Semoga THR lancar kayak comeback 😭✨</p>
        <button onclick="nextSlide()">Next ➡️</button>
    </div>
</div>

<!-- SLIDE 3 -->
<div class="slide">
    <div class="card">
        <h1>CORTIS 💌</h1>
        <img src="img_20260320_170006.jpg">
        <p>Walaupun bias beda, maaf tetap sama 💚</p>
        <button onclick="nextSlide()">Replay 🔄</button>
    </div>
</div>

<script>
let current = 0;
let slides = document.querySelectorAll(".slide");

function nextSlide(){
    slides[current].classList.remove("active");
    current = (current + 1) % slides.length;
    slides[current].classList.add("active");

    if(current === 2){
        confetti();
    }
}

/* HUJAN EMOJI */
function createEmoji(){
    let el = document.createElement("div");
    el.classList.add("emoji");
    el.innerHTML = "🍀";
    el.style.left = Math.random()*100 + "vw";
    el.style.animationDuration = (3 + Math.random()*3) + "s";
    document.body.appendChild(el);
    setTimeout(()=>{el.remove();},6000);
}
setInterval(createEmoji,100);

/* DAUN */
function createLeaf(){
    let el = document.createElement("div");
    el.classList.add("leaf");
    el.innerHTML = "🌿";
    el.style.left = Math.random()*100 + "vw";
    el.style.animationDuration = (4 + Math.random()*3) + "s";
    document.body.appendChild(el);
    setTimeout(()=>{el.remove();},7000);
}
setInterval(createLeaf,400);

/* SPARKLES */
function createSparkle(){
    let el = document.createElement("div");
    el.classList.add("sparkle");
    el.innerHTML = "✨";
    el.style.left = Math.random()*100 + "vw";
    el.style.top = Math.random()*100 + "vh";
    document.body.appendChild(el);
    setTimeout(()=>{el.remove();},2000);
}
setInterval(createSparkle,200);

/* CONFETTI */
function confetti(){
    for(let i=0;i<30;i++){
        let el = document.createElement("div");
        el.classList.add("emoji");
        el.innerHTML = "🎇";
        el.style.left = Math.random()*100 + "vw";
        el.style.animationDuration = "2s";
        document.body.appendChild(el);
        setTimeout(()=>{el.remove();},3000);
    }
}
</script>

</body>
</html>
